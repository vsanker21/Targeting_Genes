  workflow_dispatch:

jobs:
  optional-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-optional.txt -r requirements-dev.txt

      - name: High-value public datasets (dry-run)
        env:
          GLIOMA_TARGET_DATA_ROOT: ${{ runner.temp }}/glioma_hv_empty
        run: |
          mkdir -p "${{ runner.temp }}/glioma_hv_empty"
          python scripts/download_high_value_public_datasets.py --dry-run --skip-gdc-methylation

      - name: Supplementary reference resources (dry-run)
        env:
          GLIOMA_TARGET_DATA_ROOT: ${{ runner.temp }}/glioma_sup_empty
        run: |
          mkdir -p "${{ runner.temp }}/glioma_sup_empty"
          python scripts/download_supplementary_reference_resources.py --dry-run --skip-archs4-h5

      - name: Supplementary reference paths status (empty data_root)
        env:
          GLIOMA_TARGET_DATA_ROOT: ${{ runner.temp }}/glioma_sup_empty
        run: python scripts/supplementary_reference_resources_paths_status.py

      - name: Optional stack (pytest + ensure; same as run_optional_stack_ci.py)
        run: python scripts/run_optional_stack_ci.py

      - name: Third-party tooling status (non-strict PATH/pip report)
        run: python scripts/verify_optional_third_party_tooling.py

      - name: Upload functional report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optional_third_party_functional_report
          path: results/optional_third_party_functional_report.json
          if-no-files-found: ignore

      - name: Upload third-party tooling status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: third_party_tooling_status
          path: results/third_party_tooling_status.json
          if-no-files-found: ignore
