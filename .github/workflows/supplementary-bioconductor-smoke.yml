# Minimal data + Bioconductor fgsea/clusterProfiler end-to-end (demo fixtures only).
name: Supplementary Bioconductor smoke

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/supplementary-bioconductor-smoke.yml"
      - "references/demo_supplementary/**"
      - "scripts/run_supplementary_enrichment_smoke.py"
      - "scripts/install_r_supplementary_dependencies.py"
      - "scripts/install_r_supplementary_enrichment.R"
      - "Snakefile"
      - "scripts/decompress_pathwaycommons_gmt.py"
      - "scripts/build_m4_supplementary_enrichment_plan.py"
      - "scripts/build_m4_clusterprofiler_enrichment_plan.py"
      - "tests/test_supplementary_enrichment_smoke_dry_run.py"
      - "docs/SNAKEMAKE_HPC.md"
      - "profiles/example_slurm/config.yaml"
  pull_request:
    paths:
      - ".github/workflows/supplementary-bioconductor-smoke.yml"
      - "references/demo_supplementary/**"
      - "scripts/run_supplementary_enrichment_smoke.py"
      - "scripts/install_r_supplementary_dependencies.py"
      - "scripts/install_r_supplementary_enrichment.R"
      - "Snakefile"
      - "scripts/decompress_pathwaycommons_gmt.py"
      - "scripts/build_m4_supplementary_enrichment_plan.py"
      - "scripts/build_m4_clusterprofiler_enrichment_plan.py"
      - "tests/test_supplementary_enrichment_smoke_dry_run.py"
      - "docs/SNAKEMAKE_HPC.md"
      - "profiles/example_slurm/config.yaml"
      - "requirements-hpc.txt"

jobs:
  supplementary-r-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: System libraries for Bioconductor R packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install Python + Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Bioconductor stack (fgsea, clusterProfiler, org.Hs.eg.db, …)
        env:
          CI: "true"
        run: python scripts/install_r_supplementary_dependencies.py

      - name: Supplementary enrichment smoke (demo data_root + opt-in snapshot copy)
        env:
          CI: "true"
        run: python scripts/run_supplementary_enrichment_smoke.py --copy-demo-results

      - name: Assert fgsea output is non-sentinel
        run: |
          python -c "import pathlib; p=pathlib.Path('results/module4/gsea/fgsea_supplementary_pathways_results.tsv'); t=p.read_text(encoding='utf-8'); assert p.is_file(), p; assert 'pathway\tpval' in t.splitlines()[0], t[:400]; assert 'DEMO_WP_' in t or 'DEMO_PC_' in t, t[:800]; assert 'no_fgsea_results' not in t, t[:800]"

      - name: Assert clusterProfiler output has demo pathways
        run: |
          python -c "import pathlib; p=pathlib.Path('results/module4/gsea/clusterprofiler_supplementary_enricher.tsv'); t=p.read_text(encoding='utf-8'); lines=t.splitlines(); assert p.is_file(), p; assert lines and 'ID\tDescription' in lines[0], t[:400]; assert 'DEMO_WP_' in t or 'DEMO_PC_' in t, t[:800]; assert len(lines) < 2 or not lines[1].startswith('no_enriched_terms'), t[:400]"
