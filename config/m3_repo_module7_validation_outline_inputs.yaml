# Outline M3: in-repo Module 7 m7_validation path-status + integration stub JSON/flags under results/module7.
# Complements m7_validation_outline_inputs.yaml (data_root validation trees) for M3 export manifest bundling.

m3_repo_module7_validation_path_checks:
  enabled: true
  output_json: "results/module3/m3_repo_module7_validation_paths_status.json"
  done_flag: "results/module3/m3_repo_module7_validation_paths_status.flag"
  groups:
    - id: module7_validation_repo_outline_outputs
      summary: "M7 validation outline artifacts (paths_status + integration_stub) under results/module7"
      path_checks:
        - name: m7_validation_paths_status_json
          path_template: "{repo_root}/results/module7/m7_validation_paths_status.json"
        - name: m7_validation_paths_status_flag
          path_template: "{repo_root}/results/module7/m7_validation_paths_status.flag"
        - name: m7_validation_integration_stub_json
          path_template: "{repo_root}/results/module7/m7_validation_integration_stub.json"
        - name: m7_validation_integration_stub_flag
          path_template: "{repo_root}/results/module7/m7_validation_integration_stub.flag"

m3_repo_module7_validation_integration_stub:
  enabled: true
  output_json: "results/module3/m3_repo_module7_validation_integration_stub.json"
  done_flag: "results/module3/m3_repo_module7_validation_integration_stub.flag"
