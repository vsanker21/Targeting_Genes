# Outline M3: in-repo m3_deconvolution path-status + integration stub JSON/flags under results/module3.
# Complements m3_deconvolution_outline_inputs.yaml (data_root deconvolution trees) for M3 export manifest bundling.

m3_repo_deconvolution_path_checks:
  enabled: true
  output_json: "results/module3/m3_repo_deconvolution_paths_status.json"
  done_flag: "results/module3/m3_repo_deconvolution_paths_status.flag"
  groups:
    - id: module3_deconvolution_repo_outline_outputs
      summary: "M3 deconvolution outline artifacts (paths_status + integration_stub) under results/module3"
      path_checks:
        - name: m3_deconvolution_paths_status_json
          path_template: "{repo_root}/results/module3/m3_deconvolution_paths_status.json"
        - name: m3_deconvolution_paths_status_flag
          path_template: "{repo_root}/results/module3/m3_deconvolution_paths_status.flag"
        - name: m3_deconvolution_integration_stub_json
          path_template: "{repo_root}/results/module3/m3_deconvolution_integration_stub.json"
        - name: m3_deconvolution_integration_stub_flag
          path_template: "{repo_root}/results/module3/m3_deconvolution_integration_stub.flag"

m3_repo_deconvolution_integration_stub:
  enabled: true
  output_json: "results/module3/m3_repo_deconvolution_integration_stub.json"
  done_flag: "results/module3/m3_repo_deconvolution_integration_stub.flag"
