# Outline M3: in-repo Module 6 structure tooling path-status + structure_admet integration stub under results/module6.
# module6_structure_tooling_paths_status is defined in config/module6_inputs.yaml; structure_admet aggregates tooling + bridge gaps.

m3_repo_module6_structure_tooling_path_checks:
  enabled: true
  output_json: "results/module3/m3_repo_module6_structure_tooling_paths_status.json"
  done_flag: "results/module3/m3_repo_module6_structure_tooling_paths_status.flag"
  groups:
    - id: module6_structure_tooling_and_admet_repo_outline_outputs
      summary: "M6 optional pocket/docking tool path inventory plus structure_admet gap stub under results/module6"
      path_checks:
        - name: module6_structure_tooling_paths_status_json
          path_template: "{repo_root}/results/module6/module6_structure_tooling_paths_status.json"
        - name: module6_structure_tooling_paths_status_flag
          path_template: "{repo_root}/results/module6/module6_structure_tooling_paths_status.flag"
        - name: structure_admet_integration_stub_json
          path_template: "{repo_root}/results/module6/structure_admet_integration_stub.json"
        - name: structure_admet_integration_stub_flag
          path_template: "{repo_root}/results/module6/structure_admet_integration_stub.flag"

m3_repo_module6_structure_tooling_integration_stub:
  enabled: true
  output_json: "results/module3/m3_repo_module6_structure_tooling_integration_stub.json"
  done_flag: "results/module3/m3_repo_module6_structure_tooling_integration_stub.flag"
