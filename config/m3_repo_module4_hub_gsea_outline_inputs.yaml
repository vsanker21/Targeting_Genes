          path_template: "{repo_root}/results/module4/gsea/recount3_edger_signed_neg_log10_p.rnk"
        - name: gsea_prerank_export_provenance_json
          path_template: "{repo_root}/results/module4/gsea_prerank_export_provenance.json"
        - name: gsea_stratified_prerank_flag
          path_template: "{repo_root}/results/module4/gsea_stratified_prerank.flag"
        - name: gsea_stratified_welch_classical_rnk
