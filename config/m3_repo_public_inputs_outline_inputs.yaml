# Outline M3: in-repo module3_public_inputs_status JSON/flag under results/module3.
# Complements module3_inputs.yaml public_path_checks (data_root trees) for M3 export manifest bundling.

m3_repo_public_inputs_path_checks:
  enabled: true
  output_json: "results/module3/m3_repo_public_inputs_paths_status.json"
  done_flag: "results/module3/m3_repo_public_inputs_paths_status.flag"
  groups:
    - id: module3_public_inputs_repo_outline_outputs
      summary: "module3_public_inputs_status JSON/flag under results/module3"
      path_checks:
        - name: module3_public_inputs_status_json
          path_template: "{repo_root}/results/module3/module3_public_inputs_status.json"
        - name: module3_public_inputs_status_flag
          path_template: "{repo_root}/results/module3/module3_public_inputs_status.flag"

m3_repo_public_inputs_integration_stub:
  enabled: true
  output_json: "results/module3/m3_repo_public_inputs_integration_stub.json"
  done_flag: "results/module3/m3_repo_public_inputs_integration_stub.flag"
