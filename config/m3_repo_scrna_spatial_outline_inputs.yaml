# Outline M3: in-repo module3_sc_workflow path-status + scrna_spatial_integration_stub JSON/flags under results/module3.
# Complements module3_inputs.yaml sc_workflow_path_checks and scrna_spatial_integration_stub for M3 export manifest bundling.

m3_repo_scrna_spatial_path_checks:
  enabled: true
  output_json: "results/module3/m3_repo_scrna_spatial_paths_status.json"
  done_flag: "results/module3/m3_repo_scrna_spatial_paths_status.flag"
  groups:
    - id: module3_scrna_spatial_repo_outline_outputs
      summary: "scRNA/spatial workflow path-status + integration_stub artifacts under results/module3"
      path_checks:
        - name: module3_sc_workflow_paths_status_json
          path_template: "{repo_root}/results/module3/module3_sc_workflow_paths_status.json"
        - name: module3_sc_workflow_paths_status_flag
          path_template: "{repo_root}/results/module3/module3_sc_workflow_paths_status.flag"
        - name: scrna_spatial_integration_stub_json
          path_template: "{repo_root}/results/module3/scrna_spatial_integration_stub.json"
        - name: scrna_spatial_integration_stub_flag
          path_template: "{repo_root}/results/module3/scrna_spatial_integration_stub.flag"

m3_repo_scrna_spatial_integration_stub:
  enabled: true
  output_json: "results/module3/m3_repo_scrna_spatial_integration_stub.json"
  done_flag: "results/module3/m3_repo_scrna_spatial_integration_stub.flag"
