# Outline M3: in-repo results/tooling/ vendor path inventory + integration stub (Cell Ranger, Space Ranger, GNINA, conda GNINA).
# Cross-cuts module1 optional stack; aligns with config/vendor_tooling_outline_inputs.yaml and Snakemake vendor_tooling_* rules.

m3_repo_tooling_vendor_path_checks:
  enabled: true
  output_json: "results/module3/m3_repo_tooling_vendor_paths_status.json"
  done_flag: "results/module3/m3_repo_tooling_vendor_paths_status.flag"
  groups:
    - id: tooling_vendor_repo_outline_outputs
      summary: "Vendor tooling paths_status JSON/flag and integration_stub JSON/flag under results/tooling"
      path_checks:
        - name: vendor_tooling_paths_status_json
          path_template: "{repo_root}/results/tooling/vendor_tooling_paths_status.json"
        - name: vendor_tooling_paths_status_flag
          path_template: "{repo_root}/results/tooling/vendor_tooling_paths_status.flag"
        - name: vendor_tooling_integration_stub_json
          path_template: "{repo_root}/results/tooling/vendor_tooling_integration_stub.json"
        - name: vendor_tooling_integration_stub_flag
          path_template: "{repo_root}/results/tooling/vendor_tooling_integration_stub.flag"

m3_repo_tooling_vendor_integration_stub:
  enabled: true
  output_json: "results/module3/m3_repo_tooling_vendor_integration_stub.json"
  done_flag: "results/module3/m3_repo_tooling_vendor_integration_stub.flag"
