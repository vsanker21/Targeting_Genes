# Planned capabilities from Project_Outline / pipeline_outline.yaml planned bullets.
# These are not implemented as full automated steps here; see report_pipeline_planned_extensions.py.

version: 1
disclaimer: >-
  Full delivery needs controlled-access data (CGGA, CPTAC, CBTTC), HPC or cloud compute,
  licensed software (e.g. Glide), R/Bioconductor stacks (DESeq2, edgeR, Harmony, WGCNA, MOVICS),
  and third-party pipelines (SCENIC+, SLAYER, sRGES). This repo ships partial scaffolding only.

extensions:
  - id: m1_fastq_quant_reprocessing
    module: M1
    summary: "Full FASTQ to quant reprocessing (STAR/Salmon/nf-core)"
    implementation_status: partial
    notes: "m1_outline_paths_status.json group fastq_reprocessing (FASTQ staging, nf-core work dir, Salmon index paths); m1_outline_integration_stub.json readiness echo. No nf-core/rnaseq or STAR/Salmon jobs in-repo."
    blockers: [hpc_or_cloud, workflow_authoring, raw_fastq_storage]

  - id: m1_combat_harmony
    module: M1
    summary: "ComBat-Seq / Harmony batch correction"
    implementation_status: partial
    notes: "ComBat-Seq on TCGA-GBM primary STAR counts with TSS-derived batch (config/combat_seq_tcga_gbm.yaml, combat_seq_tcga_gbm_subset.R, m1_combat_seq_tcga_gbm_primary). Harmony for scRNA and richer batch covariates not wired. Optional Harmony staging path inventory (m1_harmony_batch_paths_status.json groups harmony_integrated_objects, batch_covariate_metadata, cross_dataset_integration_workspace) and m1_harmony_batch_integration_stub.json checklist (no harmony R/Scanpy execution)."
    blockers: [harmonized_count_matrix, r_bioconductor_stack, scrna_matrices, batch_metadata]

  - id: m1_cgga_cptac_cbttc
    module: M1
    summary: "CGGA / CPTAC / CBTTC ingestion"
    implementation_status: partial
    notes: "m1_outline_paths_status.json group external_cohorts (CGGA/CPTAC mirror/CBTTC roots); no parsers or API jobs."
    blockers: [controlled_access_credentials, custom_parsers, ingestion_snakemake_rules]

  - id: m1_harmonized_multi_omics
    module: M1
    summary: "Per-sample harmonized multi-omics matrix"
    implementation_status: partial
    notes: "m1_outline_paths_status.json group harmonized_multi_omics (staging + sample ID map paths)."
    blockers: [cohort_alignment, multi_assay_qc, harmonized_matrix_build]

  - id: m1_reference_gdc_mirror
    module: M1
    summary: "Reference bundle + GDC open STAR count file staging"
    implementation_status: partial
    notes: "config/data_sources.yaml references: and gdc: paths drive download_all_required / matrix builds. Optional mirror inventory (m1_reference_gdc_paths_status.json groups reference_annotation_bundle, gdc_open_star_counts_staging, gdc_client_cache_auxiliary) and m1_reference_gdc_integration_stub.json checklist (M1 outline stub echo; in-repo gdc_counts_matrix_qc.json flag; no GDC client execution)."
    blockers: [gdc_credentials, reference_version_lock, manifest_drift]

  - id: m1_batch_correction_mirror
    module: M1
    summary: "External ComBat-Seq or limma or cross-cohort harmonized count mirrors under data_root"
    implementation_status: partial
    notes: "In-repo ComBat-Seq stub: combat_seq_tcga_gbm.yaml + m1_combat_seq_tcga_gbm_primary (results/module1/combat_seq_tcga_gbm_primary). Harmony staging: m1_harmony_batch_*. Optional mirror staging (m1_batch_correction_mirror_paths_status.json groups combat_seq_or_limma_staging, cross_cohort_integrated_counts) and m1_batch_correction_mirror_integration_stub.json checklist (m1_harmony_batch_integration_stub echo; combat_seq provenance path from config; no R batch correction in-repo beyond combat rule)."
    blockers: [batch_metadata, r_runtime, matrix_storage, cross_study_id_maps]

