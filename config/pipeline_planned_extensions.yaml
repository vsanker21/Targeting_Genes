l_vs_recount3_correlation_paths_status.json group toil_vs_recount3_cross_assay_outputs) and m3_repo_toil_vs_recount3_correlation_integration_stub.json (m3_repo_bulk_welch_ols_dea and m3_repo_recount3_bulk_dea stub echo; no compare_toil_bulk_vs_recount3_effects run in this slice). Optional in-repo stratified bulk DEA provenance and integration flags (m3_repo_stratified_bulk_dea_paths_status.json group stratified_bulk_dea_repo_outputs) and m3_repo_stratified_bulk_dea_integration_stub.json (m3_repo_toil_bulk_expression and m3_repo_bulk_welch_ols_dea stub echo; no m2_stratified_* run in this slice). Optional in-repo cohort design and Verhaak subtype bundle (m3_repo_cohort_verhaak_subtype_paths_status.json group cohort_verhaak_subtype_repo_outputs) and m3_repo_cohort_verhaak_subtype_integration_stub.json (m3_repo_toil_bulk_expression and m3_repo_bundled_references stub echo; no expression_cohort_summary or m2_verhaak_subtypes run in this slice). Optional in-repo bulk join and STRING export provenance bundle (m3_repo_bulk_join_provenance_paths_status.json group bulk_join_provenance_repo_outputs) and m3_repo_bulk_join_provenance_integration_stub.json (m3_repo_bulk_welch_ols_dea, m2_2_depmap_mirror, m2_2_maf_mutsig_mirror stub echo; no m2_depmap_* or m2_dea_string_export run in this slice). Optional in-repo GDC STAR PyDESeq2/edgeR provenance bundle (m3_repo_gdc_star_tcga_gbm_dea_paths_status.json group gdc_star_tcga_gbm_dea_provenance_outputs) and m3_repo_gdc_star_tcga_gbm_dea_integration_stub.json (m3_repo_gdc_expression_matrix and m2_1_star_pairing stub echo; no m2_deseq2_tcga_* or m2_edger_tcga_* run in this slice)."
