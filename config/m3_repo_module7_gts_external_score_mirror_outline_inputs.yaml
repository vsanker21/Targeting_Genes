          path_template: "{repo_root}/results/module7/m7_gts_external_score_mirror_paths_status.flag"
        - name: m7_gts_external_score_mirror_integration_stub_json
          path_template: "{repo_root}/results/module7/m7_gts_external_score_mirror_integration_stub.json"
