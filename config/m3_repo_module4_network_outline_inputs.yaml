# Outline M3: in-repo Module 4 m4_network path-status + integration stub JSON/flags under results/module4.
# Complements m4_network_outline_inputs.yaml (data_root GRN staging trees) for M3 export manifest bundling.

m3_repo_module4_network_path_checks:
  enabled: true
  output_json: "results/module3/m3_repo_module4_network_paths_status.json"
  done_flag: "results/module3/m3_repo_module4_network_paths_status.flag"
  groups:
    - id: module4_network_repo_outline_outputs
      summary: "M4 network outline artifacts (paths_status + integration_stub) under results/module4"
      path_checks:
        - name: m4_network_paths_status_json
          path_template: "{repo_root}/results/module4/m4_network_paths_status.json"
        - name: m4_network_paths_status_flag
          path_template: "{repo_root}/results/module4/m4_network_paths_status.flag"
        - name: m4_network_integration_stub_json
          path_template: "{repo_root}/results/module4/m4_network_integration_stub.json"
        - name: m4_network_integration_stub_flag
          path_template: "{repo_root}/results/module4/m4_network_integration_stub.flag"

m3_repo_module4_network_integration_stub:
  enabled: true
  output_json: "results/module3/m3_repo_module4_network_integration_stub.json"
  done_flag: "results/module3/m3_repo_module4_network_integration_stub.flag"
