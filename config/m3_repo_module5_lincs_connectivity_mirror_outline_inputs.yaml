# Outline M3: in-repo Module 5 m5_lincs_connectivity_mirror path-status + integration stub JSON/flags under results/module5.
# Complements m5_lincs_connectivity_mirror_outline_inputs.yaml (data_root/lincs mirrors) for M3 export manifest bundling.

m3_repo_module5_lincs_connectivity_mirror_path_checks:
  enabled: true
  output_json: "results/module3/m3_repo_module5_lincs_connectivity_mirror_paths_status.json"
  done_flag: "results/module3/m3_repo_module5_lincs_connectivity_mirror_paths_status.flag"
  groups:
    - id: module5_lincs_connectivity_mirror_repo_outline_outputs
      summary: "M5 LINCS connectivity mirror outline artifacts (paths_status + integration_stub) under results/module5"
      path_checks:
        - name: m5_lincs_connectivity_mirror_paths_status_json
          path_template: "{repo_root}/results/module5/m5_lincs_connectivity_mirror_paths_status.json"
        - name: m5_lincs_connectivity_mirror_paths_status_flag
          path_template: "{repo_root}/results/module5/m5_lincs_connectivity_mirror_paths_status.flag"
        - name: m5_lincs_connectivity_mirror_integration_stub_json
          path_template: "{repo_root}/results/module5/m5_lincs_connectivity_mirror_integration_stub.json"
        - name: m5_lincs_connectivity_mirror_integration_stub_flag
          path_template: "{repo_root}/results/module5/m5_lincs_connectivity_mirror_integration_stub.flag"

m3_repo_module5_lincs_connectivity_mirror_integration_stub:
  enabled: true
  output_json: "results/module3/m3_repo_module5_lincs_connectivity_mirror_integration_stub.json"
  done_flag: "results/module3/m3_repo_module5_lincs_connectivity_mirror_integration_stub.flag"
