[pytest]
testpaths = tests
pythonpath = . tests scripts
markers =
    snakemake: snakemake --dry-run (targets from pipeline_inventory manifest_paths + output_json); -m "not snakemake" skips; subprocess env uses scripts/snakemake_subprocess_env.py (strips GLIOMA_TARGET_INCLUDE_* optional rule all gates)
    integration: subprocess / temp repos / optional real results (see test_pipeline_index_integration.py, test_snakemake_workflow_integration.py)
    results_contract: flag vs provenance under results/module3 (test_m3_deconv_committed_results_flag_contract.py; skips when paths absent; M3_RESULTS_CONTRACT_REPO + test_m3_results_contract_fixture_repo.py for committed fixtures)
filterwarnings =
    ignore:errors='ignore' is deprecated:FutureWarning:cmapPy.pandasGEXpress.parse_gct
